# index.html names the current content-hashed bundles, so it must never be served stale: a cached
# shell would point browsers at bundle URLs that no longer exist after a deploy. Play's default is
# "public, max-age=3600". This also applies to non-hashed assets (favicon, robots.txt), which is a
# cheap trade -- they revalidate with an ETag and get a 304 rather than a full re-download.
# Everything under assets/ is content-hashed by Vite and served with play.assets.aggressiveCache
# instead; see controllers.UIController.
play.assets.defaultCache = "public, max-age=0, must-revalidate"

# --- database -------------------------------------------------------------------------------
# H2 writing to a file under ./data, through Play's default HikariCP pool. Production swaps the
# url/driver for Postgres (and sets credentials) without touching code; the SQL in
# conf/evolutions and repository.ChirpRepository is deliberately vanilla.
# DB_CLOSE_DELAY=-1 keeps the database open when the pool has no live connections.
db.default.driver = org.h2.Driver
db.default.url = "jdbc:h2:./data/chirper;DB_CLOSE_DELAY=-1"
db.default.username = sa
db.default.password = ""

# The relative H2 path above resolves against the process working directory, which differs
# between `sbt run` (project root) and the staged start script (its own app dir) -- two launches
# can silently use two different database files. Deployments therefore set DATABASE_JDBC_URL
# explicitly (an absolute H2 path, or Postgres with DATABASE_DRIVER=org.postgresql.Driver).
db.default.driver = ${?DATABASE_DRIVER}
db.default.url = ${?DATABASE_JDBC_URL}
db.default.username = ${?DATABASE_USERNAME}
db.default.password = ${?DATABASE_PASSWORD}

# Schema is managed by evolutions (conf/evolutions/default/*.sql). Auto-apply is right for this
# app everywhere; a team wanting manual review in production would override this per-environment.
play.evolutions.db.default.autoApply = true

# Blocking JDBC runs on this dedicated pool (see repository.DatabaseExecutionContext), sized to
# match HikariCP's default of 10 connections. Keeps slow queries from starving the default
# dispatcher that serves requests.
database.dispatcher {
  executor = "thread-pool-executor"
  throughput = 1
  thread-pool-executor {
    fixed-pool-size = 10
  }
}

# --- security -------------------------------------------------------------------------------
# The literal below keeps dev/stage bootable out of the box; any real deployment must set
# APPLICATION_SECRET, which overrides it. Play refuses to start in prod mode with a too-short
# secret, but it cannot know this literal is public -- rotating it is on the deployer.
play.http.secret.key = "chirper-dev-secret-0123456789abcdefghijklmnopqrstuvwxyz-not-for-prod"
play.http.secret.key = ${?APPLICATION_SECRET}

# Host header allowlist. Dev needs localhost only; deployments add their domain via ALLOWED_HOST
# (the ${?...} element vanishes from the list when the variable is unset).
play.filters.hosts.allowed = ["localhost", "127.0.0.1", ${?ALLOWED_HOST}]
